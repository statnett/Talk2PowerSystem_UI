items:
  - title: "Equipment & Components"
    icon: "images/equipment-components.svg"
    questions:
      - title: "Breaker equipment associated with current transformer."
        question: "Which breakers are associated with the current transformer ENGENE CT3? Please include detailed information about each."
      - title: "Load break switches."
        question: "Can you list all the load break switches?"
      - title: "Linear shunt compensators part of voltage level and of a substation."
        question: "Which linear shunt compensators are part of voltage level ENGENE 22 VL1 and transitively part of substation ENGENE? Please include detailed information."
      - title: "Power transformer ends, part of terminal with resistance Y."
        question: "Which ends of power transformer AJAURE T1 have a resistance value of 0? Please include detailed information."
      - title: "Potential transformers connected via terminals to breaker."
        question: "Which potential transformers are connected via terminals to the breaker ENGENE 22 NE1 E? Please include detailed information."
      - title: "Rotating machine activities connected to grid state alteration."
        question: "Which rotating machine activities are connected to the grid state alteration GSA KVI KRISTIAN G1 within its grid state alteration set? Please include detailed information."
      - title: "Synchronous machines within voltage level."
        question: "Which synchronous machines in voltage level KRISTIAN300 have a maximum reactive power of up to 850? Please include detailed information."
      - title: "Generating unit that includes rotating machine."
        question: "Which generating unit includes the rotating machine MALMO 420 M1? Please include detailed information."
      - title: "Fuse equipment connected to node."
        question: "Which fuses are connected to the node TELEMA2 04 CN7? Please include detailed information."
      - title: "AC line segments that are components of line."
        question: "Which AC line segments make up the line 04 TELEMA2 ACLS7? Please include detailed information."
      - title: "Objects categorized as pin terminals."
        question: "Can you list all objects categorized as pin terminals, with detailed information?"
      - title: "Connection terminals for the equivalent injection."
        question: "Which connection terminals belong to the equivalent injection ARENDAL 420 TM EQV? Please include detailed information."
      - title: "Instances of station supply."
        question: "Can you find all instances of station supply in the data? Please include details."
      - title: "Energy consumers part of non-conformance group."
        question: "Which energy consumers are part of the non-conformance group STEENKU 135 LG1? Please include details."
      - title: "Long AC line segments."
        question: "Which AC line segments are longer than 100 km? Please include their length and base voltage, and the substations they connect."

  - title: "Containment & Location"
    icon: "images/containment-location.svg"
    questions:
      - title: "Substations have fuse as part of their equipment."
        question: "Which substations have the fuse TELEMA2 04 Fu25 as part of their equipment? Please include detailed information."
      - title: "Bays that belong to a voltage level with infrastructure part Petersen coil."
        question: "Which bays belong to a voltage level whose infrastructure includes the Petersen coil ARENDAL 132 T1 PC? Please include detailed information."
      - title: "Sub-geographical region in country that includes as a substation."
        question: "Which sub-geographical region in Norway includes TELEMA2 04 CB4 as one of its substations? Please include detailed information."
      - title: "Sub-geographical regions that contain voltage level."
        question: "Which sub-geographical regions contain the voltage level HAGAFOSS420? Please include detailed information."
      - title: "Voltage levels containing bays with fuse."
        question: "Which voltage levels contain bays with the fuse TELEMA2 04 Fu30? Please include detailed information."
      - title: "Voltage levels per substation."
        question: "Which voltage levels are contained in the substation ARENDAL, and what is the nominal voltage of each? Please include detailed information."

  - title: "Connectivity & Topology"
    icon: "images/connectivity-topology.svg"
    questions:
      - title: "Regulating controls connected to the terminals of busbar section."
        question: "Which regulating controls are connected to the terminals of the busbar section BLAFALLI300 A? Please include detailed information."
      - title: "Fuse equipment that is connected to the node."
        question: "Which fuses are connected to the node TELEMA2 04 CN7? Please include detailed information."
      - title: "Terminals connected to equivalent injection."
        question: "Which terminals are connected to the equivalent injection NEDENES 04 LV EQV? Please include detailed information."
      - title: "Topological islands sharing angle reference with node."
        question: "Which topological islands share the same angle reference node as XARE1_XARE2 CN? Please include details."
      - title: "Synchronous areas in the system."
        question: "What are the different synchronous areas in the system? Please include detailed information."
      - title: "Connectivity nodes within voltage level."
        question: "Which connectivity nodes are contained within the voltage level MALMO 420? Please include detailed information."
      - title: "Topological node interacting with voltage level."
        question: "Which topological node interacts with the voltage level SYLLING 420 LSC1 through its terminal equipment? Please include detailed information."
      - title: "Equipment connected to busbar section."
        question: "Which equipment items are electrically connected to the busbar section BLAFALLI300 A through its connectivity nodes? Please include the type and name of each."

  - title: "Operational & Control"
    icon: "images/operational-control.svg"
    questions:
      - title: "Regulating controls associated with synchronous machine in voltage mode."
        question: "Which regulating controls are associated with the synchronous machine BLAFALLI300 M3 and operate in voltage mode? Please include detailed information."
      - title: "Stages linked with trigger."
        question: "Which stages are linked with the trigger ST1 S1 NorNed? Please include detailed information."
      - title: "Control areas overseeing generating unit with power tolerance X."
        question: "Which control areas are responsible for the generating unit SIMA G1 and have a power tolerance level of 0.1? Please include details."
      - title: "Operational limit types with direction X and kind Y."
        question: "Which operational limit types have direction \"low\" and kind \"stability\"? Please include detailed information. What other directions and kinds exist?"
      - title: "Topological islands connected to terminal via angle reference node."
        question: "Which topological islands have an angle reference topological node associated with the terminal 2dd90295-bdfb-11e5-94fa-c8f73332c8f4? Please include detailed information."
      - title: "Operational limits on AC line segment."
        question: "Which operational limits are defined on the AC line segment KARLSH 420 L1, and what are their kinds, directions, and values? Please include detailed information."

  - title: "Market & Asset Management"
    icon: "images/market-asset_management.svg"
    questions:
      - title: "List all Distribution System Operators."
        question: "Can you list all Distribution System Operators in the dataset, with detailed information?"
      - title: "Scheduling area connecting bidding zone and synchronous area."
        question: "Which scheduling area connects the bidding zone NO2 and the synchronous area 10Y1001C--00146U? Please include details."
      - title: "Bidding zone borders between and."
        question: "Which bidding zone borders exist between LT and SE4? Please include detailed information."
      - title: "Manufacturers supplying products for asset info."
        question: "Which manufacturers supply products that correspond to the asset information \"PC Tap Changer\"? Please include details, and give a few examples of other asset info names."
      - title: "Product asset models produced by a manufacturer with specific usage kind."
        question: "Which product asset models are produced by Schneider Electric Manufacture and categorized under the transmission usage kind? Please include details."
      - title: "List all asset owners."
        question: "Can you list all asset owners, with detailed information?"

  - title: "Diagram & Model"
    icon: "images/diagram-model.svg"
    questions:
      - title: "Single Line diagram of a substation"
        question: "Show me a diagram of Arendal substation!"
      - title: "Network area diagram of a load area"
        question: "Show me a diagram of the SE LA load area."
      - title: "Visual Graph of a CIM instance."
        question: "Show me a vis graph of KARLSH 420 L1"
      - title: "Visual Graph of a CIM Class (model diagram)."
        question: "Show me a diagram of the kinds of equipment in the CIM"

  - title: "Timeseries"
    icon: "images/timeseries.svg"
    questions:
      - title: "Energy prices in EUR for NO1"
        question: "Energy prices in EUR for NO1; for the second half of 2024, monthly average and standard deviation"
      - title: "Power flow from NO1 to NO3"
        question: "Power flow from NO1 to NO3; for 2025, weekly average, min, max"
